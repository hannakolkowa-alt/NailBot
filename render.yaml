# Бесплатный Web Service + webhooks (Worker на Render платный).
services:
  - type: web
    name: nails-telegram-bot
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: TelegramBotToken
        sync: false
      - key: SupabaseUrl
        sync: false
      - key: SupabaseKey
        sync: false
